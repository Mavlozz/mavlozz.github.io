<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — MAVLO</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%238b5cf6'/><text x='50' y='74' font-size='66' font-family='Arial Black,Arial' font-weight='900' fill='white' text-anchor='middle'>M</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #08080f;
      color: #e2e2f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,.07) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* glowing orb */
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 500px; height: 500px;
      background: radial-gradient(ellipse, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .page-404 {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      animation: rise 0.7s cubic-bezier(.23,1,.32,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: none; }
    }

    .error-code {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(96px, 22vw, 210px);
      font-weight: 900;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px rgba(139,92,246,0.45);
      text-shadow: 0 0 80px rgba(139,92,246,0.25);
      letter-spacing: -6px;
      animation: glitch-404 7s linear infinite;
      user-select: none;
    }

    @keyframes glitch-404 {
      0%, 88%, 100% { text-shadow: 0 0 80px rgba(139,92,246,0.25); transform: none; filter: none; }
      90% { text-shadow: -5px 0 #ff00ff, 5px 0 #00ffff; transform: skewX(-4deg) translateX(-2px); }
      92% { text-shadow: 5px 0 #ff00ff, -5px 0 #00ffff; transform: skewX(4deg) translateX(2px); filter: hue-rotate(90deg); }
      94% { text-shadow: -3px 0 #8b5cf6; transform: none; filter: none; }
    }

    .error-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(16px, 3vw, 26px);
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
      margin-top: 8px;
      margin-bottom: 18px;
    }

    .error-sub {
      color: #8888aa;
      font-size: 16px;
      line-height: 1.65;
      max-width: 420px;
      margin: 0 auto 40px;
    }

    .error-sub strong { color: #c084fc; font-weight: 500; }

    .error-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 30px;
      background: #7c3aed;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 0 32px rgba(124,58,237,0.4);
      transition: all 0.25s ease;
    }

    .error-btn:hover {
      background: #8b5cf6;
      box-shadow: 0 0 52px rgba(139,92,246,0.65);
      transform: translateY(-3px);
    }

    .error-btn-ghost {
      background: transparent;
      border: 1px solid rgba(139,92,246,0.3);
      color: #8888aa;
      box-shadow: none;
    }

    .error-btn-ghost:hover {
      border-color: rgba(139,92,246,0.7);
      color: #e2e2f0;
      background: rgba(139,92,246,0.08);
      box-shadow: none;
    }

    .error-tag {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(139,92,246,0.4);
      margin-top: 48px;
    }

    /* floating dots decoration */
    .dot {
      position: fixed;
      border-radius: 50%;
      background: rgba(139,92,246,0.15);
      animation: float-dot linear infinite;
      pointer-events: none;
    }

    @keyframes float-dot {
      from { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      to   { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="page-404">
    <div class="error-code">404</div>
    <div class="error-title">СТРАНИЦА НЕ НАЙДЕНА</div>
    <p class="error-sub">
      Похоже, ты заблудился где-то в <strong>GTA&nbsp;RP</strong>...<br>
      Такой страницы не существует или она была перемещена.
    </p>
    <div class="error-btns">
      <a href="/" class="error-btn"><i class="fas fa-home"></i> На главную</a>
      <a href="majestic/" class="error-btn error-btn-ghost"><i class="fas fa-gamepad"></i> Majestic RP</a>
    </div>
    <div class="error-tag">// MAVLO GAMING CHANNEL</div>
  </div>

  <script>
    // floating decoration dots
    for (let i = 0; i < 12; i++) {
      const d = document.createElement('div');
      const size = 4 + Math.random() * 8;
      d.className = 'dot';
      d.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        bottom:${-10 + Math.random()*20}%;
        animation-duration:${6 + Math.random()*10}s;
        animation-delay:${Math.random()*8}s;
      `;
      document.body.appendChild(d);
    }
  </script>
</body>
</html>
